name: MyOrbit Test & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 6 AM UTC
    - cron: '0 6 * * *'

env:
  FLUTTER_VERSION: '3.16.0'
  
jobs:
  # Analyze code quality and formatting
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Verify formatting
      run: dart format --output=none --set-exit-if-changed .
      
    - name: Analyze project source
      run: flutter analyze --fatal-infos
      
    - name: Check for outdated dependencies
      run: flutter pub outdated --exit-code

  # Unit and Widget Tests
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze
    
    strategy:
      matrix:
        test-category: [unit, widget, accessibility]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Create test directories
      run: |
        mkdir -p test_results
        mkdir -p coverage
      
    - name: Run ${{ matrix.test-category }} tests
      run: |
        case "${{ matrix.test-category }}" in
          "unit")
            flutter test test/services/ test/helpers/ test/*_test.dart --coverage --reporter json > test_results/unit_results.json
            ;;
          "widget") 
            flutter test test/widgets/ test/screens/ --coverage --reporter json > test_results/widget_results.json
            ;;
          "accessibility")
            flutter test test/widgets/accessibility/ --coverage --reporter json > test_results/accessibility_results.json
            ;;
        esac
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-category }}
        path: test_results/
        retention-days: 30
        
    - name: Upload coverage data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-${{ matrix.test-category }}
        path: coverage/
        retention-days: 30

  # Integration Tests
  integration-test:
    name: Integration Tests  
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: analyze
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Enable KVM group perms
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: AVD cache
      uses: actions/cache@v3
      id: avd-cache
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-29
        
    - name: Create AVD and generate snapshot for caching
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: echo "Generated AVD snapshot for caching."
        
    - name: Run integration tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: default
        arch: x86_64
        profile: Nexus 6
        script: |
          flutter test test/integration/ --reporter json > test_results/integration_results.json || true
          
    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: test_results/
        retention-days: 30

  # Coverage Report Generation
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Install LCOV
      run: sudo apt-get update && sudo apt-get install -y lcov
      
    - name: Download all coverage artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: coverage-*
        merge-multiple: true
        path: coverage/
        
    - name: Merge coverage files
      run: |
        # Find and merge all lcov.info files
        find coverage/ -name "lcov.info" -exec cat {} \; > coverage/merged_lcov.info
        
    - name: Generate coverage report
      run: |
        chmod +x scripts/coverage_report.sh
        scripts/coverage_report.sh --skip-tests --no-fail-on-threshold
        
    - name: Generate coverage summary
      run: |
        # Parse coverage and create summary
        COVERAGE=$(lcov --summary coverage/merged_lcov.info 2>&1 | grep -E "lines|functions|branches" | tail -3)
        echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$COVERAGE" >> $GITHUB_STEP_SUMMARY  
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📋 [View detailed coverage report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
        
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage/html/
          test_results/coverage_summary.json
          test_results/coverage_badge.txt
        retention-days: 90
        
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          try {
            const coverageSummary = JSON.parse(fs.readFileSync('test_results/coverage_summary.json', 'utf8'));
            const badgeUrl = fs.readFileSync('test_results/coverage_badge.txt', 'utf8').trim();
            
            const body = `## 📊 Test Coverage Report
            
            ![Coverage Badge](${badgeUrl})
            
            | Type | Coverage | Threshold | Status |
            |------|----------|-----------|--------|
            | Lines | ${coverageSummary.line_coverage.toFixed(1)}% | ${coverageSummary.thresholds.line_threshold}% | ${coverageSummary.line_coverage >= coverageSummary.thresholds.line_threshold ? '✅' : '❌'} |
            | Functions | ${coverageSummary.function_coverage.toFixed(1)}% | ${coverageSummary.thresholds.function_threshold}% | ${coverageSummary.function_coverage >= coverageSummary.thresholds.function_threshold ? '✅' : '❌'} |
            | Branches | ${coverageSummary.branch_coverage.toFixed(1)}% | ${coverageSummary.thresholds.branch_threshold}% | ${coverageSummary.branch_coverage >= coverageSummary.thresholds.branch_threshold ? '✅' : '❌'} |
            
            📋 [View detailed HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            ⏱️ Generated: ${coverageSummary.timestamp}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } catch (error) {
            console.log('Could not post coverage comment:', error);
          }

  # Test Results Summary  
  test-results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, integration-test, coverage]
    if: always()
    
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: test-results-*
        merge-multiple: true
        path: test_results/
        
    - name: Download integration test results
      uses: actions/download-artifact@v4
      with:
        name: integration-test-results
        path: test_results/
        
    - name: Generate test summary
      run: |
        echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Count results from JSON files
        TOTAL_TESTS=0
        PASSED_TESTS=0
        FAILED_TESTS=0
        
        for file in test_results/*_results.json; do
          if [[ -f "$file" ]]; then
            echo "Processing $file..." >> $GITHUB_STEP_SUMMARY
            # Simple parsing - in production, use jq or proper JSON parser
            TESTS=$(grep -o '"tests":[0-9]*' "$file" | cut -d: -f2 || echo "0")
            FAILURES=$(grep -o '"failures":[0-9]*' "$file" | cut -d: -f2 || echo "0")
            
            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            FAILED_TESTS=$((FAILED_TESTS + FAILURES))
            PASSED_TESTS=$((PASSED_TESTS + TESTS - FAILURES))
          fi
        done
        
        echo "| Category | Tests | Passed | Failed |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Total** | $TOTAL_TESTS | $PASSED_TESTS | $FAILED_TESTS |" >> $GITHUB_STEP_SUMMARY
        
        if [[ $FAILED_TESTS -eq 0 ]]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All tests passed!**" >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "❌ **$FAILED_TESTS test(s) failed**" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Upload combined test results
      uses: actions/upload-artifact@v4
      with:
        name: all-test-results
        path: test_results/
        retention-days: 90

  # Notify on completion
  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [test-results]
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
    - name: Notify on success
      if: needs.test-results.result == 'success'
      run: |
        echo "✅ All tests and coverage checks passed for ${{ github.ref_name }}"
        
    - name: Notify on failure  
      if: needs.test-results.result != 'success'
      run: |
        echo "❌ Tests or coverage checks failed for ${{ github.ref_name }}"
        exit 1