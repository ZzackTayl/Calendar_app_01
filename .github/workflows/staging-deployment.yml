# PolyHarmony Staging Deployment Pipeline
# Simplified staging workflow using Vercel's automatic branch deployments

name: Staging Deployment

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main]
    types: [labeled]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preview

# Environment variables
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Test and validate
  test-and-deploy:
    name: Test and Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
      preview_url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          echo "🧪 Running test suite..."
          npm run test:ci

      - name: Security scan
        run: |
          echo "🔒 Running security scan..."
          npm audit --audit-level=high

      - name: Build application
        run: |
          echo "🔨 Building application..."
          npm run build

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod' # Deploy to production for main branch
          working-directory: ./
          scope: ${{ secrets.VERCEL_ORG_ID }}

  # Notification
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [test-and-deploy]
    if: always()
    steps:
      - name: Discord notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Set deployment status and color
          if [[ "${{ needs.test-and-deploy.result }}" == "success" ]]; then
            STATUS="✅ Success"
            COLOR="3066993"  # Green
          else
            STATUS="❌ Failed"
            COLOR="15158332"  # Red
          fi

          # Create Discord embed
          cat > discord-payload.json << EOF
          {
            "embeds": [
              {
                "title": "Staging Deployment $STATUS",
                "color": $COLOR,
                "fields": [
                  {
                    "name": "Branch",
                    "value": "${{ github.ref_name }}",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "[${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})",
                    "inline": true
                  },
                  {
                    "name": "Triggered by",
                    "value": "${{ github.actor }}",
                    "inline": true
                  }
                ],
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
              }
            ]
          }
          EOF

          # Send notification to Discord
          curl -X POST "${{ env.DISCORD_WEBHOOK_URL }}" \
               -H "Content-Type: application/json" \
               -d @discord-payload.json
