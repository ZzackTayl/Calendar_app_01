# CodeQL Security Analysis Workflow
# This workflow performs CodeQL security analysis on JavaScript/TypeScript code

name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '30 1 * * 0'  # Weekly on Sundays at 1:30 AM UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Initialize the CodeQL tools for scanning
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        config: |
          name: "CodeQL Config"
          
          # Disable problematic queries that might conflict with Next.js patterns
          disable-default-queries: false
          
          # Include additional security queries
          queries:
            - uses: security-and-quality
            - uses: security-extended
          
          # Configure paths to analyze
          paths:
            - "app"
            - "components"
            - "hooks"
            - "lib"
            - "middleware.ts"
          
          # Exclude problematic paths that might cause parsing issues
          paths-ignore:
            - "node_modules"
            - "**/*.test.ts"
            - "**/*.test.tsx"
            - "**/*.spec.ts"
            - "**/*.spec.tsx"
            - ".next"
            - "coverage"
            - "dist"
            - "build"
            - "docs"
            - "scripts/migrate-*.js"
            - "scripts/fix-*.js"
        
        # Use the latest CodeQL CLI
        tools: latest

    # Build the application to ensure all dependencies are resolved
    - name: Build application
      run: |
        npm run build
      env:
        NODE_ENV: production
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'placeholder-secret-for-analysis' }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'https://example.com' }}

    # Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        upload: true
        
    # Upload results as artifacts for debugging
    - name: Upload CodeQL results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: codeql-results-${{ matrix.language }}
        path: |
          /home/runner/work/_temp/codeql_databases
        retention-days: 7
