name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Prepare test env
        run: npm run prepare:test-env

      - name: Run unit tests
        run: npm run test:unit

  integration_tests:
    name: Integration Tests (DB)
    runs-on: ubuntu-latest
    needs: unit_tests
    continue-on-error: true  # Phase-in: make non-blocking until stabilized
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Docker info
        run: |
          docker --version
          docker compose version

      - name: Start test database
        run: docker compose -f docker-compose.test.yml up -d test-db

      - name: Run integration tests
        run: npm run test:integration

      - name: Stop test database
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  production_readiness:
    name: Production Readiness Suites
    runs-on: ubuntu-latest
    needs: integration_tests
    continue-on-error: true  # Phase-in: non-blocking until stabilized
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Prepare test env
        run: npm run prepare:test-env

      - name: Privacy boundary tests
        run: npm run test:privacy:all

      - name: Multi-relationship tests
        run: npm run test:relationships

      - name: Performance & reliability tests
        run: npm run test:performance

      - name: Email/invitation load tests
        run: npm run test:scale:email

      - name: Data integrity & recovery tests
        run: npm run test:integrity

      - name: Monitoring tests
        run: npm run test:monitoring

  e2e_user_journey:
    name: E2E User Journey (Playwright)
    runs-on: ubuntu-latest
    needs: production_readiness
    continue-on-error: true  # Phase-in: non-blocking until stabilized
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build app (for potential local server usage)
        run: npm run build

      - name: Run E2E user journey tests
        run: npm run test:user-journey