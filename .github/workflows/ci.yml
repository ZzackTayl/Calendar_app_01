name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint:cached

      - name: Build
        env:
          RUNTIME_SKIP_AUTOSTART: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: npm run build

      - name: Run unit tests
        env:
          TEST_TYPE: unit
        run: npm run test:unit

      - name: Upload test results (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results
            api-test-results.json
            api-endpoints.json
          if-no-files-found: ignore


