name: myorbit_calendar
description: MyOrbit - A sophisticated, consent-aware calendar for complex social networks

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  sentry_flutter: ^9.7.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  flutter_riverpod: ^3.0.3
  riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  
  # Routing
  go_router: ^16.2.4
  
  # Models/Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Networking & Backend
  dio: ^5.9.0
  supabase_flutter: ^2.10.3

  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.5.0
  firebase_crashlytics: ^4.3.0
  firebase_messaging: ^15.2.5

  # Environment & Config
  flutter_dotenv: ^6.0.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  timezone: ^0.10.1
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^9.2.2
  
  # Cryptography & Encryption
  crypto: ^3.0.6
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  
  # UI Components
  table_calendar: ^3.2.0
  
  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^11.0.0

  # Push Notifications
  flutter_local_notifications: ^19.5.0
  
  # Storage
  shared_preferences: ^2.5.3
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Contacts
  flutter_contacts: ^1.1.9+2
  system_time_change_detector: ^0.0.4
  
  # Google Calendar API
  googleapis: ^15.0.0
  googleapis_auth: ^2.0.0
  google_sign_in: ^7.2.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  get_it: ^8.3.0
  firebase_storage: ^12.4.10
  cloud_functions: ^5.6.2
  dartz: ^0.10.1

dev_dependencies:
  sentry_dart_plugin: ^3.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Testing & Coverage
  coverage: ^1.15.0
  test: 1.26.2  # Flutter SDK test_api pin prevents 1.26.3
  mockito: 5.5.0  # Analyzer constraints prevent 5.5.1
  bloc_test: ^9.1.7
  golden_toolkit: ^0.15.0
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^3.19.0
  args: ^2.7.0
  yaml: ^3.1.3
  
  # Code generation
  build_runner: 2.7.1  # build_runner >=2.9.0 conflicts with mockito 5.5.0
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - icons/
    - .env

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: myorbit
