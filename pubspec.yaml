name: myorbit_calendar
description: MyOrbit - A sophisticated, consent-aware calendar for complex social networks

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State management
  riverpod: ^2.4.9
  hooks_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Routing
  go_router: ^12.1.3
  
  # Models/Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Networking & Backend
  dio: ^5.4.0
  supabase_flutter: ^2.3.4
  
  # Environment & Config
  flutter_dotenv: ^5.1.0
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  
  # UI Components
  table_calendar: ^3.0.9
  
  # Push Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.2
  
  # Error tracking
  sentry_flutter: ^7.14.0
  
  # Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - icons/
