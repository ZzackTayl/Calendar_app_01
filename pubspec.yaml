name: myorbit_calendar
description: MyOrbit - A sophisticated, consent-aware calendar for complex social networks

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State management
  flutter_riverpod: ^3.0.3
  riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  
  # Routing
  go_router: ^16.2.4
  
  # Models/Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  
  # Networking & Backend
  dio: ^5.4.0
  supabase_flutter: ^2.3.4
  
  # Environment & Config
  flutter_dotenv: ^6.0.0
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.20.2
  timezone: ^0.10.1
  url_launcher: ^6.3.0
  
  # Cryptography & Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  
  # UI Components
  table_calendar: ^3.0.9
  
  # Push Notifications (disabled for MVP)
  # firebase_messaging: ^14.7.10
  flutter_local_notifications: ^19.4.2
  
  # Error tracking
  sentry_flutter: ^9.7.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Permissions
  permission_handler: ^12.0.1
  
  # Contacts
  flutter_contacts: ^1.1.9+2

dev_dependencies:
  sentry_dart_plugin: ^3.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Testing & Coverage
  coverage: ^1.7.1
  test: ^1.24.9
  mockito: ^5.4.4
  golden_toolkit: ^0.15.0
  flutter_driver:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^3.0.0
  args: ^2.4.2
  yaml: ^3.1.2
  
  # Code generation
  build_runner: ^2.4.7
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - icons/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: flutter
  org: spoonsavercom
