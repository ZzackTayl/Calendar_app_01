version: '3.8'

services:
  database:
    image: postgres:14
    container_name: calendar_db
    environment:
      POSTGRES_DB: calendar_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init:/docker-entrypoint-initdb.d
    networks:
      - calendar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: calendar_server
    depends_on:
      database:
        condition: service_healthy
    environment:
      SERVERPOD_MODE: development
      DB_HOST: database
      DB_PASSWORD: example
      DB_USER: postgres
      DB_NAME: calendar_dev
    ports:
      - "8080:8080"
    networks:
      - calendar_network
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro

  # Optional: Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: calendar_redis
    ports:
      - "6379:6379"
    networks:
      - calendar_network
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  calendar_network:
    driver: bridge