version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - ./schemas/polyharmony_schema.sql:/docker-entrypoint-initdb.d/init.sql

  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      sh -c "
        echo \"Waiting for database to be ready...\";
        until nc -z db 5432;
        do
          sleep 1;
        done;
        echo \"Database is ready, running tests...\";
        node test-primary-user-flows.js
      "
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
