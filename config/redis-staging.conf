# Redis Staging Environment Configuration
# Optimized for staging workloads with debugging enabled

# Basic Configuration
port 6379
bind 0.0.0.0
protected-mode no
timeout 300
tcp-keepalive 60

# Memory and Performance
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Persistence (for staging data retention)
save 900 1
save 300 10
save 60 10000

# Enable AOF for better durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Slow log (for debugging)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# TCP backlog
tcp-backlog 511

# Database count
databases 16

# Security (basic for staging)
requirepass staging_redis_password_change_me

# Key expiration notifications (useful for session monitoring)
notify-keyspace-events Ex

# Enable stats
info-stats yes

# Staging-specific configuration
# More verbose logging for debugging
syslog-enabled yes
syslog-ident redis-staging
syslog-facility local0

# Allow dangerous commands for staging debugging
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command EVAL ""
rename-command DEBUG ""