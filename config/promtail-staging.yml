# Promtail Configuration for PolyHarmony Staging Environment
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki-staging:3100/loki/api/v1/push

scrape_configs:
  # Application logs
  - job_name: polyharmony-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: polyharmony-app-staging
          environment: staging
          service: application
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            method: method
            url: url
            user_id: user_id
            duration: duration
            status: status

      - timestamp:
          source: timestamp
          format: RFC3339

      - labels:
          level:
          method:
          status:

  # Nginx/Traefik access logs
  - job_name: traefik-access-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik-staging
          environment: staging
          service: proxy
          __path__: /var/log/traefik/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<request_uri>\S+) (?P<server_protocol>\S+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'

      - timestamp:
          source: time_local
          format: 02/Jan/2006:15:04:05 -0700

      - labels:
          method:
          status:
          remote_addr:

  # Database logs
  - job_name: postgresql-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: postgresql-staging
          environment: staging
          service: database
          __path__: /var/log/postgresql/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} \w+) \[(?P<pid>\d+)\]: \[(?P<line_num>\d+)-(?P<seq>\d+)\] user=(?P<user>\w*),db=(?P<database>\w*),app=(?P<application>\w*),client=(?P<client>\S*) (?P<level>\w+): (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: 2006-01-02 15:04:05.000 MST

      - labels:
          level:
          user:
          database:
          application:

  # Redis logs
  - job_name: redis-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: redis-staging
          environment: staging
          service: cache
          __path__: /var/log/redis/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<pid>\d+):(?P<role>\w) (?P<timestamp>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<level>\w) (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: 02 Jan 2006 15:04:05.000

      - labels:
          level:
          role:

  # System logs
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-staging
          environment: staging
          service: system
          __path__: /var/log/syslog

    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w{3} \d{1,2} \d{2}:\d{2}:\d{2}) (?P<hostname>\S+) (?P<service>\w+)(\[(?P<pid>\d+)\])?: (?P<message>.*)'

      - timestamp:
          source: timestamp
          format: Jan 2 15:04:05

      - labels:
          hostname:
          service:

  # Docker container logs
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
        filters:
          - name: label
            values: ["environment=staging"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time

      - timestamp:
          source: timestamp
          format: RFC3339

      - output:
          source: output

      - labels:
          stream:
          container_name:
          compose_service:
          compose_project: